<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Web Form Assignment</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      .error-text {
        color: #dc3545;
        font-size: 0.875rem;
      }

      .field-error {
        display: block;
        margin-top: 0.25rem;
      }
    </style>
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <div class="card shadow mx-auto" style="max-width: 700px">
        <div class="card-body p-4">
          <h1 class="h3 mb-4">Interactive Web Form</h1>

          <form id="interactiveForm" novalidate>
            <div class="mb-3">
              <label class="form-label" for="username">Username</label>
              <input type="text" id="username" name="username" class="form-control" />
              <small id="usernameError" class="error-text field-error"></small>
            </div>

            <div class="mb-3">
              <label class="form-label" for="email">Email</label>
              <input type="email" id="email" name="email" class="form-control" />
              <small id="emailError" class="error-text field-error"></small>
            </div>

            <div class="mb-3">
              <label class="form-label" for="password">Password</label>
              <input type="password" id="password" name="password" class="form-control" />
              <small id="passwordError" class="error-text field-error"></small>
            </div>

            <div class="mb-3">
              <label class="form-label" for="confirmPassword">Confirmed Password</label>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                class="form-control"
              />
              <small id="confirmPasswordError" class="error-text field-error"></small>
            </div>

            <fieldset class="mb-3">
              <legend class="form-label fw-bold mb-2">
                Interesting Topics
                <small id="topicsError" class="error-text fw-normal ms-2"></small>
              </legend>

              <div class="form-check">
                <input
                  class="form-check-input topic"
                  type="checkbox"
                  name="topics"
                  id="topicHtml"
                  value="HTML"
                />
                <label class="form-check-label" for="topicHtml">HTML</label>
              </div>
              <div class="form-check">
                <input
                  class="form-check-input topic"
                  type="checkbox"
                  name="topics"
                  id="topicCss"
                  value="CSS"
                />
                <label class="form-check-label" for="topicCss">CSS</label>
              </div>
              <div class="form-check">
                <input
                  class="form-check-input topic"
                  type="checkbox"
                  name="topics"
                  id="topicJavaScript"
                  value="JavaScript"
                />
                <label class="form-check-label" for="topicJavaScript">JavaScript</label>
              </div>
            </fieldset>

            <div class="mb-3">
              <label class="form-label fw-bold" for="gender">
                Gender
                <small id="genderError" class="error-text fw-normal ms-2"></small>
              </label>
              <select id="gender" name="gender" class="form-select">
                <option value="">--</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
          </form>
        </div>
      </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
      $(function () {
        const requiredFields = ["username", "email", "password", "confirmPassword"];

        function clearErrors() {
          $(".form-control, .form-select").removeClass("is-invalid");
          $(".error-text").text("");
        }

        function showFieldError(fieldId, message) {
          $("#" + fieldId).addClass("is-invalid");
          $("#" + fieldId + "Error").text(message);
        }

        $("#interactiveForm").on("submit", function (event) {
          event.preventDefault();
          clearErrors();

          let isValid = true;

          requiredFields.forEach(function (fieldId) {
            if ($.trim($("#" + fieldId).val()) === "") {
              showFieldError(fieldId, "this field must not be empty");
              isValid = false;
            }
          });

          if ($(".topic:checked").length === 0) {
            $("#topicsError").text("At least one topic must be selected");
            isValid = false;
          }

          if ($("#gender").val() === "") {
            $("#gender").addClass("is-invalid");
            $("#genderError").text("please choose your gender");
            isValid = false;
          }

          if (
            $("#confirmPassword").val() !== "" &&
            $("#confirmPassword").val() !== $("#password").val()
          ) {
            showFieldError(
              "confirmPassword",
              "confirmed password mismatched the password",
            );
            isValid = false;
          }

          if (isValid) {
            alert("Form submitted successfully!");
          }
        });

        $(".form-control").on("input", function () {
          $(this).removeClass("is-invalid");
          $("#" + this.id + "Error").text("");
        });

        $(".topic").on("change", function () {
          if ($(".topic:checked").length > 0) {
            $("#topicsError").text("");
          }
        });

        $("#gender").on("change", function () {
          $(this).removeClass("is-invalid");
          $("#genderError").text("");
        });
      });
    </script>
  </body>
</html>
